services:
  postgres:
    image: postgres:16-alpine
    container_name: omnidask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omnidask
      POSTGRES_PASSWORD: omnidask
      POSTGRES_DB: omnidask
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnidask -d omnidask"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: omnidask-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: omnidask
      MINIO_ROOT_PASSWORD: omnidask-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: omnidask-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 omnidask omnidask-secret &&
      mc mb --ignore-existing local/omnidask
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
